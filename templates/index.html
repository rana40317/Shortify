<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shortify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 { margin-bottom: 24px; color: #333; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { border-color: #6c63ff; }
        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #574fd6; }
        .result {
            margin-top: 20px;
            padding: 14px;
            background: #f0fff4;
            border: 1px solid #b2f5c8;
            border-radius: 8px;
            display: none;
        }
        .result a {
            color: #6c63ff;
            word-break: break-all;
            font-size: 14px;
        }
        .error {
            background: #fff0f0;
            border-color: #ffb2b2;
            color: #cc0000;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Shortify: A URL Shortener</h2>
        <input type="text" id="longUrl" placeholder="Enter your long URL here..." />
        <button onclick="shortenURL()">Shorten URL</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        async function shortenURL() {
            const input = document.getElementById("longUrl");
            const result = document.getElementById("result");
            const url = input.value.trim();

            if (!url) {
                result.className = "result error";
                result.style.display = "block";
                result.textContent = "Please enter a URL.";
                return;
            }

            const fullUrl = url.startsWith("http") ? url : "https://" + url;

            try {
                const response = await fetch("/shorten", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: fullUrl })
                });

                const data = await response.json();

                if (data.short_url) {
                    result.className = "result";
                    result.style.display = "block";
                    result.innerHTML = `Short URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
                } else {
                    throw new Error("No short URL returned");
                }
            } catch (err) {
                result.className = "result error";
                result.style.display = "block";
                result.textContent = "Error: Could not shorten URL. Is Flask running?";
            }
        }

        document.getElementById("longUrl").addEventListener("keydown", e => {
            if (e.key === "Enter") shortenURL();
        });
    </script>
</body>
</html>
